<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Логинов-PNG">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Логинов-PNG</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
@font-face{font-family:'DAMN';src:url('fonts/DAMN.ttf') format('truetype');font-weight:400;font-display:swap}
@font-face{font-family:'NeueSoviet';src:url('fonts/Neue_soviet.ttf') format('truetype');font-weight:400;font-display:swap}
@font-face{font-family:'VasekSolo';src:url('fonts/VasekItalic.ttf') format('truetype');font-weight:400;font-display:swap}
@font-face{font-family:'VasekDuet';src:url('fonts/VasekItalic2.ttf') format('truetype');font-weight:400;font-display:swap}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}

:root{
  --ui:'Inter','Apple Color Emoji','Segoe UI Emoji',sans-serif;
  --bg:#0a0a0c;
  --card:#17171a;
  --card-2:#1f1f23;
  --fg:#f5f5f7;
  --dark:#1d1d1f;
  --border:rgba(255,255,255,.08);
  --muted:#86868b;
  --red:#FFC13A;
  --accent:#fff;
  --edge:20px;
  --ease-spring:cubic-bezier(.16,1,.3,1);
  --radius:14px;
}

body{font-family:var(--ui);background:var(--bg);color:var(--fg);-webkit-font-smoothing:antialiased}

@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

.app{
  max-width:560px;margin:0 auto;
  padding:calc(20px + env(safe-area-inset-top)) max(var(--edge),env(safe-area-inset-right)) calc(28px + env(safe-area-inset-bottom)) max(var(--edge),env(safe-area-inset-left));
  min-height:100dvh;display:flex;flex-direction:column;gap:14px;
}

.logo{display:flex;align-items:center;justify-content:center;gap:5px;padding:8px 0 4px}
.logo-m{width:13px;height:13px;flex-shrink:0;overflow:hidden;display:block}
.logo-m .sf{transform-box:fill-box;transform-origin:center;animation:spin 8s linear infinite;will-change:transform}
.logo-n{font-size:14px;font-weight:800;letter-spacing:-2px;line-height:1}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;flex-direction:column;gap:12px;transition:background .3s var(--ease-spring)}
.card-dark{background:#000;border-color:rgba(255,255,255,.06)}

.lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--muted)}
.card-dark .lbl{color:rgba(255,255,255,.35)}

textarea{
  width:100%;border:none;outline:none;resize:none;
  padding:8px 0 0;background:transparent;
  caret-color:currentColor;
  font-size:26px;line-height:1.25;
  min-height:96px;
  color:#fff;
  transition:color .25s var(--ease-spring),font-family .2s;
}
textarea::placeholder{color:rgba(255,255,255,.2)}

/* Превью PNG */
.preview-wrap{
  border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);
  background:
    linear-gradient(45deg,#d8d8dc 25%,transparent 25%),
    linear-gradient(-45deg,#d8d8dc 25%,transparent 25%),
    linear-gradient(45deg,transparent 75%,#d8d8dc 75%),
    linear-gradient(-45deg,transparent 75%,#d8d8dc 75%);
  background-size:16px 16px;
  background-position:0 0,0 8px,8px -8px,-8px 0px;
  background-color:#ebebef;
  position:relative;
  min-height:160px;
  display:flex;align-items:center;justify-content:center;
  padding:16px;
}
.preview-canvas{max-width:100%;max-height:340px;display:block;animation:fadeIn .3s var(--ease-spring)}
.preview-empty{font:500 12px var(--ui);color:var(--muted);letter-spacing:-.1px}

/* Селекторы */
.cg{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.cg3{grid-template-columns:1fr 1fr 1fr}
.ct{
  background:var(--card-2);border:1px solid var(--border);border-radius:10px;
  padding:10px;display:flex;flex-direction:column;gap:4px;
  font-size:10px;font-weight:500;color:var(--muted);letter-spacing:-.16px;
}
.ct select{
  border:none;background:transparent;padding:0;
  font:600 12px var(--ui);color:var(--fg);outline:none;-webkit-appearance:none;
  width:100%;
}
.ct select option{background:var(--card);color:var(--fg)}

/* Цветовые чипы */
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{
  width:32px;height:32px;border-radius:50%;border:2px solid transparent;
  cursor:pointer;transition:transform .2s var(--ease-spring),border-color .2s;
  position:relative;flex-shrink:0;
  background-clip:padding-box;
}
.chip.on{border-color:#fff;transform:scale(1.1)}
.chip.custom{background:conic-gradient(from 0deg,#ff0000,#ffff00,#00ff00,#00ffff,#0000ff,#ff00ff,#ff0000);overflow:hidden}
.chip.custom input{position:absolute;inset:0;opacity:0;cursor:pointer;border-radius:50%}
.chip.custom::after{content:'+';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font:700 18px var(--ui);color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.4);pointer-events:none}

/* Слайдеры */
.sr{display:flex;align-items:center;gap:8px;padding-right:4px}
.sr input[type=range]{flex:1;height:2px;-webkit-appearance:none;background:rgba(255,255,255,.14);outline:none;border-radius:1px}
.sr input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#fff;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.4)}
.sv{font:600 12px var(--ui);color:var(--fg);min-width:46px;text-align:right;flex-shrink:0}

.sep{font:600 10px var(--ui);text-transform:uppercase;letter-spacing:.8px;color:var(--muted);padding:2px 0;display:flex;align-items:center;justify-content:space-between}

/* Переключатели (toggle) */
.tg{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
.tg input{display:none}
.tg-sw{width:36px;height:22px;background:rgba(255,255,255,.14);border-radius:11px;position:relative;transition:background .25s var(--ease-spring);flex-shrink:0}
.tg-sw::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;background:#fff;border-radius:50%;transition:transform .25s var(--ease-spring);box-shadow:0 1px 3px rgba(0,0,0,.4)}
.tg input:checked + .tg-sw{background:var(--red)}
.tg input:checked + .tg-sw::after{transform:translateX(14px)}
.tg-lbl{font:600 12px var(--ui);color:var(--fg)}

/* Сетка направлений тени */
.dir-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;max-width:180px}
.dir{
  aspect-ratio:1;border:1px solid var(--border);border-radius:8px;background:var(--card-2);
  color:var(--muted);font:500 16px/1 var(--ui);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s,color .2s,border-color .2s,transform .15s var(--ease-spring);
}
.dir:active{transform:scale(.92)}
.dir.on{background:var(--red);color:#fff;border-color:var(--red)}

/* Иконочные тулбары (align / case) */
.tbar{display:flex;gap:4px;background:var(--card-2);border:1px solid var(--border);border-radius:10px;padding:3px}
.tb{
  flex:1;height:38px;border:none;background:transparent;border-radius:8px;
  color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;
  font:600 13px/1 var(--ui);letter-spacing:-.2px;
  transition:background .2s,color .2s,transform .15s var(--ease-spring);
}
.tb:active{transform:scale(.94)}
.tb.on{background:#fff;color:#000}
.tb svg{width:18px;height:18px;display:block}
.tb .cs-a{font-size:14px}
.tb .cs-a sup{font-size:9px;vertical-align:super;margin-left:-2px}

/* Выпадающий список шрифтов */
.font-select{
  position:relative;background:var(--card-2);border:1px solid var(--border);border-radius:10px;
  padding:12px 36px 12px 14px;display:flex;flex-direction:column;gap:2px;
  cursor:pointer;transition:background .2s;
}
.font-select .fs-k{font:500 10px var(--ui);text-transform:uppercase;letter-spacing:.8px;color:var(--muted)}
.font-select .fs-v{font:600 16px var(--ui);color:var(--fg)}
.font-select .fs-ic{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.font-select select{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;font-size:16px}
.font-select select option{background:var(--card);color:var(--fg);font-size:15px}

/* Раскрывающаяся секция */
.collapse{overflow:hidden;max-height:0;opacity:0;transition:max-height .3s var(--ease-spring),opacity .2s,margin-top .3s}
.collapse.on{max-height:600px;opacity:1;margin-top:4px}

/* Кнопки */
.btn{
  width:100%;padding:16px;border:none;border-radius:var(--radius);color:#000;
  font:600 14px/1 var(--ui);letter-spacing:-.2px;cursor:pointer;
  transition:transform .2s var(--ease-spring),opacity .2s;
  background:#fff;
}
.btn:active{transform:scale(.97)}
.btn.off{opacity:.2;pointer-events:none}
.btn-reset{background:transparent;color:var(--muted);border:1px solid var(--border);font-size:12px;padding:12px}

.warn{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;font:500 12px/1.35 var(--ui);color:var(--fg);display:none}
.ft{font-size:11px;color:var(--muted);opacity:.45;text-align:center;margin-top:auto;padding-top:8px;letter-spacing:-.16px}

.ib{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;display:none;align-items:center;gap:10px}
.ib.on{display:flex}
.ib-t{flex:1;font:500 12px/1.35 var(--ui);color:var(--fg)}
.ib-b{flex-shrink:0;padding:8px 14px;background:#fff;color:#000;border:none;border-radius:8px;font:600 11px/1 var(--ui);cursor:pointer}
.ib-x{flex-shrink:0;width:24px;height:24px;background:none;border:none;font-size:16px;color:var(--muted);cursor:pointer}
.ios-hint{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;font:500 11px/1.4 var(--ui);color:var(--fg);display:none}
.ios-hint.on{display:block}

.ov{position:fixed;inset:0;background:rgba(29,29,31,.6);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);display:none;align-items:center;justify-content:center;padding:var(--edge);z-index:99999}
.ov.on{display:flex}
.ov-p{width:min(400px,100%);background:var(--card);border-radius:var(--radius);padding:24px;border:1px solid var(--border)}
.ov-n{font:500 14px/1.45 var(--ui);color:var(--fg);margin-bottom:16px}
.ov-a{display:flex;gap:8px}
.ov-a button{flex:1;height:44px;border:none;border-radius:10px;font:500 13px/1 var(--ui);cursor:pointer}
.ov-a button:active{transform:scale(.97)}
.ov-b1{background:#fff;color:#000}
.ov-b2{background:var(--card-2);color:var(--fg)}
</style>
</head>
<body>

<div class="app">

  <div class="logo">
    <svg class="logo-m" viewBox="-3 18 81 81" fill="none" xmlns="http://www.w3.org/2000/svg"><g class="sf"><path d="M47.3818 41.2734L64.4385 31.4268L74.5459 48.9346L57.4883 58.7822L74.5469 68.6309L64.4395 86.1377L47.3818 76.2891V95.9863H27.166V76.2891L10.1084 86.1377L0 68.6299L17.0566 58.7812L0.000976562 48.9346L10.1094 31.4277L27.166 41.2754V21.5801H47.3818V41.2734Z" fill="currentColor"/></g></svg>
    <span class="logo-n">ТУКАЙФ</span>
  </div>

  <div class="ib" id="ib">
    <span class="ib-t">Добавь на рабочий стол</span>
    <button class="ib-b" id="ib_a" type="button">Установить</button>
    <button class="ib-x" id="ib_x" type="button">&times;</button>
  </div>
  <div class="ios-hint" id="ios_h">Нажми <b>«Поделиться»</b> → <b>«На экран Домой»</b></div>

  <!-- Поле ввода -->
  <div class="card card-dark">
    <div class="lbl" id="font_lbl">DAMN</div>
    <textarea id="t_text" spellcheck="false" autocapitalize="off" autocorrect="off" placeholder="Введи текст" rows="3"></textarea>
  </div>

  <!-- Превью PNG -->
  <div class="preview-wrap" id="preview_wrap">
    <canvas class="preview-canvas" id="preview_canvas" style="display:none"></canvas>
    <div class="preview-empty" id="preview_empty">Превью появится после ввода текста</div>
  </div>

  <!-- Шрифт + размер -->
  <div class="card">
    <div class="font-select">
      <span class="fs-k">Шрифт</span>
      <span class="fs-v" id="fp_val">DAMN</span>
      <svg class="fs-ic" width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <select id="s_font">
        <option value="DAMN" selected>DAMN</option>
        <option value="NeueSoviet">Neue Soviet</option>
        <option value="VasekSolo">Vasek Solo</option>
        <option value="VasekDuet">Vasek Duet</option>
      </select>
    </div>

    <div class="lbl">Выравнивание</div>
    <div class="tbar" id="align_bar">
      <button type="button" class="tb on" data-align="left" title="Слева">
        <svg viewBox="0 0 18 18" fill="none"><path d="M2 4h14M2 8h10M2 12h14M2 16h8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      </button>
      <button type="button" class="tb" data-align="center" title="Центр">
        <svg viewBox="0 0 18 18" fill="none"><path d="M2 4h14M4 8h10M2 12h14M5 16h8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      </button>
      <button type="button" class="tb" data-align="right" title="Справа">
        <svg viewBox="0 0 18 18" fill="none"><path d="M2 4h14M6 8h10M2 12h14M8 16h8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      </button>
    </div>

    <div class="lbl">Регистр</div>
    <div class="tbar" id="case_bar">
      <button type="button" class="tb on" data-case="auto" title="Авто"><span class="cs-a">Aa</span></button>
      <button type="button" class="tb" data-case="upper" title="ВСЁ ЗАГЛАВНЫМИ">AA</button>
      <button type="button" class="tb" data-case="lower" title="всё строчными">aa</button>
    </div>

    <div class="lbl">Цвет текста</div>
    <div class="chips" id="color_chips">
      <div class="chip on" data-c="#ffffff" style="background:#fff;box-shadow:inset 0 0 0 1px var(--border)"></div>
      <div class="chip" data-c="#1d1d1f" style="background:#1d1d1f;box-shadow:inset 0 0 0 2px rgba(255,255,255,.5)"></div>
      <div class="chip" data-c="#FFC13A" style="background:#FFC13A"></div>
      <div class="chip" data-c="#EF6A95" style="background:#EF6A95"></div>
      <div class="chip" data-c="#CECECE" style="background:#CECECE"></div>
    </div>

    <div class="lbl">Размер</div>
    <div class="sr"><input type="range" id="r_size" min="30" max="200" step="5" value="120"><span class="sv" id="v_size">120</span></div>
    <div class="lbl">Межбуквенное</div>
    <div class="sr"><input type="range" id="r_ls" min="-10" max="10" step="0.5" value="0"><span class="sv" id="v_ls">0%</span></div>
    <div class="lbl">Межстрочное</div>
    <div class="sr"><input type="range" id="r_lh" min="60" max="160" step="5" value="110"><span class="sv" id="v_lh">110%</span></div>
  </div>

  <button class="btn off" id="dl" type="button">Скачать PNG</button>
  <button class="btn btn-reset" id="btn_reset" type="button">Сбросить всё</button>

  <div class="warn" id="w_warn"></div>
  <div class="ft">ТУКАЙФ 20—26 · v2</div>

  <div class="ov" id="ov">
    <div class="ov-p">
      <div class="ov-n" id="ov_n"></div>
      <div class="ov-a">
        <button class="ov-b1" id="ov_c" type="button">Скопировать ссылку</button>
        <button class="ov-b2" id="ov_x" type="button">Закрыть</button>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  var $=function(s){return document.querySelector(s)};
  var $$=function(s){return Array.from(document.querySelectorAll(s))};

  if(window.Telegram&&window.Telegram.WebApp){
    try{
      window.Telegram.WebApp.ready();
      window.Telegram.WebApp.expand();
      window.Telegram.WebApp.setHeaderColor('#0a0a0c');
      window.Telegram.WebApp.setBackgroundColor('#0a0a0c');
    }catch(e){}
  }

  var FONTS={
    DAMN:{family:"'DAMN',sans-serif",weight:400,label:'DAMN'},
    NeueSoviet:{family:"'NeueSoviet',sans-serif",weight:400,label:'Neue Soviet'},
    VasekSolo:{family:"'VasekSolo',cursive",weight:400,label:'Vasek Solo'},
    VasekDuet:{family:"'VasekDuet',cursive",weight:400,label:'Vasek Duet'}
  };

  var state={color:'#ffffff',font:'DAMN',align:'left',caseMode:'auto'};

  var SCALE=5;
  var MIN_W=400, MIN_H=400;
  var MAX_PX=16777216;
  var MAX_DIM=4096;

  function releaseCanvas(c){c.width=1;c.height=1;var x=c.getContext('2d');x&&x.clearRect(0,0,1,1)}
  function isIOS(){return/iPhone|iPad|iPod/i.test(navigator.userAgent)}
  function isSafari(){return/^((?!chrome|android).)*safari/i.test(navigator.userAgent)}
  function isTG(){return/Telegram/i.test(navigator.userAgent)}
  function isStandalone(){return window.matchMedia('(display-mode:standalone)').matches||navigator.standalone===true}
  function showWarn(m){var w=$('#w_warn');if(!m){w.style.display='none';w.textContent='';return}w.style.display='block';w.textContent=m}
  function autoH(el){el.style.height='1px';el.style.height=el.scrollHeight+'px'}

  function autoCap(text){
    if(!text)return text;
    var out='';var cap=true;
    for(var i=0;i<text.length;i++){
      var ch=text[i];
      if(cap&&/[a-zA-Zа-яА-ЯёЁ]/.test(ch)){out+=ch.toUpperCase();cap=false}
      else{out+=ch}
      if(ch==='.')cap=true;
    }
    return out;
  }
  function applyCase(text){
    if(state.caseMode==='upper')return text.toUpperCase();
    if(state.caseMode==='lower')return text.toLowerCase();
    return autoCap(text);
  }
  function mutateTextareaCase(){
    var el=$('#t_text');
    var pos=el.selectionStart;
    var before=el.value;
    var after=applyCase(before);
    if(before!==after){el.value=after;try{el.selectionStart=el.selectionEnd=pos}catch(e){}}
  }

  function lnW(ctx,ln,ls){
    if(!ln)return 0;
    var chars=Array.from(ln);
    var m=ctx.measureText(ln);
    var base=m.width;
    if(m.actualBoundingBoxLeft!==undefined&&m.actualBoundingBoxRight!==undefined){
      base=Math.max(base,m.actualBoundingBoxLeft+m.actualBoundingBoxRight);
    }
    return base+(chars.length>1?(chars.length-1)*ls:0);
  }

  function drawLn(ctx,ln,x,y,ls){
    if(!ln)return;
    var chars=Array.from(ln);
    if(Math.abs(ls)<.5){ctx.fillText(ln,x,y);return}
    var cx=x;
    for(var i=0;i<chars.length;i++){
      ctx.fillText(chars[i],cx,y);
      cx+=ctx.measureText(chars[i]).width+ls;
    }
  }

  function measBlk(ctx,txt,px,wt,lh,ls,ff){
    ctx.font=wt+' '+px+'px '+ff;
    var lsp=ls*px/100, lhp=Math.round(px*lh/100);
    var lines=(txt||'').split('\n');
    var mw=0;
    for(var i=0;i<lines.length;i++){var w=lnW(ctx,lines[i],lsp);if(w>mw)mw=w}
    mw+=px*0.12;
    return{w:mw,h:lines.length*lhp,lines:lines,lsp:lsp,lhp:lhp};
  }

  function render(canvas){
    var text=$('#t_text').value;
    if(!text.trim()){canvas.width=0;canvas.height=0;return false}

    var fontKey=state.font;
    var font=FONTS[fontKey];
    var color=state.color;
    var align=state.align;
    var szRaw=parseInt($('#r_size').value);
    var ls=parseFloat($('#r_ls').value);
    var lh=parseFloat($('#r_lh').value);

    /* Предварительный замер в 1x — вычисляем максимально возможный scale */
    var probeCanvas=document.createElement('canvas');
    var probeCtx=probeCanvas.getContext('2d',{alpha:true});
    var baseM=measBlk(probeCtx,text,szRaw,font.weight,lh,ls,font.family);
    var basePad=24;
    var baseW=basePad*2+Math.max(baseM.w,10);
    var baseH=basePad*2+baseM.h;
    var scByW=MAX_DIM/baseW;
    var scByH=MAX_DIM/baseH;
    var scByArea=Math.sqrt(MAX_PX/(baseW*baseH));
    var dynScale=Math.min(SCALE,scByW,scByH,scByArea);
    if(dynScale<0.3)dynScale=0.3;

    var ok=false;
    for(var att=0;att<3;att++){
      var sc=dynScale*(att===0?1:att===1?0.8:0.5);
      var px=szRaw*sc;
      var pad=24*sc;

      var m=measBlk(probeCtx,text,px,font.weight,lh,ls,font.family);
      var cW=Math.max(m.w,10);
      var outW=Math.max(pad*2+cW,MIN_W);
      var outH=Math.max(pad*2+m.h,MIN_H);

      if(outW>MAX_DIM||outH>MAX_DIM||outW*outH>MAX_PX)continue;

      canvas.width=Math.round(outW);canvas.height=Math.round(outH);
      var ctx=canvas.getContext('2d',{alpha:true});
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.font=font.weight+' '+px+'px '+font.family;
      ctx.textBaseline='top';
      ctx.fillStyle=color;
      var cy=pad;
      for(var i=0;i<m.lines.length;i++){
        var w=lnW(ctx,m.lines[i],m.lsp);
        var x=pad;
        if(align==='center')x=pad+(cW-w)/2;
        else if(align==='right')x=pad+cW-w;
        drawLn(ctx,m.lines[i],x,cy,m.lsp);
        cy+=m.lhp;
      }
      ok=true;break;
    }
    releaseCanvas(probeCanvas);
    return ok;
  }

  function updatePreview(){
    var pc=$('#preview_canvas');
    var pe=$('#preview_empty');
    if(!$('#t_text').value.trim()){
      pc.style.display='none';
      pe.style.display='block';
      return;
    }
    var go=function(){
      var ok=render(pc);
      if(ok){
        pc.style.display='block';
        pe.style.display='none';
      }else{
        pc.style.display='none';
        pe.style.display='block';
      }
    };
    if(document.fonts&&document.fonts.ready)document.fonts.ready.then(go);
    else go();
  }

  function applyLive(){
    var t=$('#t_text');
    var font=FONTS[state.font];

    $('#font_lbl').textContent=font.label;
    $('#fp_val').textContent=font.label;
    t.style.fontFamily=font.family;
    t.style.fontWeight=font.weight;
    t.style.textAlign=state.align;
    t.style.color=state.color;
    t.style.letterSpacing=$('#r_ls').value/100+'em';
    t.style.lineHeight=$('#r_lh').value/100;
    t.style.fontSize=Math.max(16,$('#r_size').value/3)+'px';

    $('#v_ls').textContent=$('#r_ls').value+'%';
    $('#v_lh').textContent=$('#r_lh').value+'%';
    $('#v_size').textContent=$('#r_size').value;
  }

  var STORAGE_KEY='loginov_png_draft';
  function saveDraft(){
    try{
      localStorage.setItem(STORAGE_KEY,JSON.stringify({
        text:$('#t_text').value,
        font:state.font,
        color:state.color,
        align:state.align,
        caseMode:state.caseMode,
        size:$('#r_size').value,
        ls:$('#r_ls').value,
        lh:$('#r_lh').value
      }));
    }catch(e){}
  }
  function clearDraft(){try{localStorage.removeItem(STORAGE_KEY)}catch(e){}}
  function loadDraft(){
    try{
      var raw=localStorage.getItem(STORAGE_KEY);
      if(!raw)return false;
      var d=JSON.parse(raw);
      if(!d||typeof d!=='object')return false;
      if(typeof d.text==='string')$('#t_text').value=d.text;
      if(d.font&&FONTS[d.font]){state.font=d.font;$('#s_font').value=d.font}
      if(d.color){
        state.color=d.color;
        $$('#color_chips .chip').forEach(function(el){
          el.classList.toggle('on',el.dataset.c===d.color);
        });
      }
      if(d.align){
        state.align=d.align;
        $$('#align_bar .tb').forEach(function(b){b.classList.toggle('on',b.dataset.align===d.align)});
      }
      if(d.caseMode){
        state.caseMode=d.caseMode;
        $$('#case_bar .tb').forEach(function(b){b.classList.toggle('on',b.dataset.case===d.caseMode)});
      }
      if(d.size)$('#r_size').value=d.size;
      if(d.ls!=null)$('#r_ls').value=d.ls;
      if(d.lh!=null)$('#r_lh').value=d.lh;
      return true;
    }catch(e){return false}
  }

  var previewTimer=null;
  function update(){
    autoH($('#t_text'));
    $('#dl').classList.toggle('off',!$('#t_text').value.trim());
    applyLive();
    saveDraft();
    clearTimeout(previewTimer);
    previewTimer=setTimeout(updatePreview,120);
  }

  function tgOv(){
    var ov=$('#ov');
    $('#ov_n').innerHTML='Открой в <b>Safari</b> для сохранения.';
    ov.classList.add('on');
    $('#ov_x').onclick=function(){ov.classList.remove('on')};
    $('#ov_c').onclick=function(){
      try{navigator.clipboard.writeText(location.href);$('#ov_n').innerHTML='Скопировано. Вставь в Safari.'}
      catch(e){window.prompt('Скопируй:',location.href)}
    };
  }

  function dataURLtoBlob(dataURL){
    var parts=dataURL.split(',');
    var mime=parts[0].match(/:(.*?);/)[1];
    var raw=atob(parts[1]);
    var arr=new Uint8Array(raw.length);
    for(var i=0;i<raw.length;i++)arr[i]=raw.charCodeAt(i);
    return new Blob([arr],{type:mime});
  }

  function tgWebApp(){
    var w=window.Telegram&&window.Telegram.WebApp;
    if(!w)return null;
    var p=w.platform||'';
    if(p&&p!=='unknown')return w;
    if(w.initData||w.initDataUnsafe&&Object.keys(w.initDataUnsafe).length)return w;
    if(/Telegram/i.test(navigator.userAgent))return w;
    return null;
  }

  function sendToBot(){
    var tg=tgWebApp();
    if(!tg)return false;
    var payload={
      text:$('#t_text').value,
      font:state.font,
      color:state.color,
      align:state.align,
      size:parseInt($('#r_size').value),
      ls:parseFloat($('#r_ls').value),
      lh:parseFloat($('#r_lh').value)
    };
    try{tg.sendData(JSON.stringify(payload));return true}
    catch(e){showWarn('Ошибка отправки: '+e.message);return false}
  }

  function buildSafariURL(){
    var base=location.origin+location.pathname;
    var p=new URLSearchParams();
    p.set('text',$('#t_text').value);
    p.set('font',state.font);
    p.set('color',state.color);
    p.set('align',state.align);
    p.set('case',state.caseMode);
    p.set('size',$('#r_size').value);
    p.set('ls',$('#r_ls').value);
    p.set('lh',$('#r_lh').value);
    p.set('auto','1');
    return base+'?'+p.toString();
  }

  function openInSafari(){
    var tg=tgWebApp();
    var url=buildSafariURL();
    if(tg&&tg.openLink){
      try{tg.openLink(url,{try_instant_view:false});return true}catch(e){}
    }
    try{window.open(url,'_blank');return true}catch(e){}
    return false;
  }

  function download(){
    if(!$('#t_text').value.trim())return;
    showWarn('');

    if(tgWebApp()){
      if(sendToBot()){
        try{tgWebApp().close()}catch(e){}
      }
      return;
    }

    var go=function(){
      var tmp=document.createElement('canvas');
      var ok=render(tmp);
      if(!ok){releaseCanvas(tmp);return}
      var dataURL=tmp.toDataURL('image/png');
      releaseCanvas(tmp);
      if(!dataURL||dataURL.length<100){showWarn('Ошибка PNG.');return}
      var blob=dataURLtoBlob(dataURL);
      var u2=URL.createObjectURL(blob);
      var a2=document.createElement('a');
      a2.href=u2;a2.download='text.png';
      document.body.appendChild(a2);a2.click();a2.remove();
      setTimeout(function(){URL.revokeObjectURL(u2)},1500);
    };
    if(document.fonts&&document.fonts.ready)document.fonts.ready.then(go);
    else setTimeout(go,300);
  }

  /* Чипы цвета */
  function bindChips(containerSel,customInputSel,onPick){
    var container=$(containerSel);
    container.querySelectorAll('.chip').forEach(function(el){
      if(el.classList.contains('custom'))return;
      el.addEventListener('click',function(){
        container.querySelectorAll('.chip').forEach(function(c){c.classList.remove('on')});
        el.classList.add('on');
        onPick(el.dataset.c);
      });
    });
    var ci=$(customInputSel);
    if(ci){
      ci.addEventListener('input',function(){
        container.querySelectorAll('.chip').forEach(function(c){c.classList.remove('on')});
        ci.parentElement.classList.add('on');
        onPick(ci.value);
      });
    }
  }

  bindChips('#color_chips',null,function(c){state.color=c;update()});

  $$('#align_bar .tb').forEach(function(btn){
    btn.addEventListener('click',function(){
      $$('#align_bar .tb').forEach(function(b){b.classList.remove('on')});
      btn.classList.add('on');
      state.align=btn.dataset.align;
      update();
    });
  });

  $$('#case_bar .tb').forEach(function(btn){
    btn.addEventListener('click',function(){
      $$('#case_bar .tb').forEach(function(b){b.classList.remove('on')});
      btn.classList.add('on');
      state.caseMode=btn.dataset.case;
      mutateTextareaCase();
      update();
    });
  });

  $('#s_font').addEventListener('change',function(){state.font=this.value;update()});

  var inputs='#t_text,#r_size,#r_ls,#r_lh';
  inputs.split(',').forEach(function(s){
    $(s).addEventListener('input',update);
    $(s).addEventListener('change',update);
  });

  $('#t_text').addEventListener('input',function(){mutateTextareaCase()});
  $('#dl').addEventListener('click',download);

  $('#btn_reset').addEventListener('click',function(){
    $('#t_text').value='';
    $('#r_size').value='120';
    $('#r_ls').value='0';
    $('#r_lh').value='110';
    state.color='#ffffff';
    state.font='DAMN';
    state.align='left';
    state.caseMode='auto';
    $$('#color_chips .chip').forEach(function(c){c.classList.remove('on')});
    $('#color_chips .chip[data-c="#ffffff"]').classList.add('on');
    $$('#align_bar .tb').forEach(function(b){b.classList.toggle('on',b.dataset.align==='left')});
    $$('#case_bar .tb').forEach(function(b){b.classList.toggle('on',b.dataset.case==='auto')});
    $('#s_font').value='DAMN';
    clearDraft();
    update();
  });

  function applyUrlParams(){
    var q=new URLSearchParams(location.search);
    if(!q.has('text'))return false;
    var txt=q.get('text')||'';
    $('#t_text').value=txt;
    var f=q.get('font');if(f&&FONTS[f]){state.font=f;$('#s_font').value=f}
    var c=q.get('color');if(c){
      state.color=c;
      var matched=false;
      $$('#color_chips .chip').forEach(function(el){
        if(el.dataset.c===c){el.classList.add('on');matched=true}
        else{el.classList.remove('on')}
      });
    }
    var a=q.get('align');if(a){
      state.align=a;
      $$('#align_bar .tb').forEach(function(b){b.classList.toggle('on',b.dataset.align===a)});
    }
    var cs=q.get('case');if(cs){
      state.caseMode=cs;
      $$('#case_bar .tb').forEach(function(b){b.classList.toggle('on',b.dataset.case===cs)});
    }
    var sz=q.get('size');if(sz)$('#r_size').value=sz;
    var ls=q.get('ls');if(ls)$('#r_ls').value=ls;
    var lh=q.get('lh');if(lh)$('#r_lh').value=lh;
    return q.get('auto')==='1';
  }

  var hasUrlParams=new URLSearchParams(location.search).has('text');
  var autoTrigger=applyUrlParams();
  if(!hasUrlParams)loadDraft();
  applyLive();
  update();
  if(autoTrigger){
    setTimeout(function(){
      if(document.fonts&&document.fonts.ready){
        document.fonts.ready.then(function(){setTimeout(download,200)});
      }else{
        setTimeout(download,400);
      }
    },100);
  }

  if(isStandalone())return;
  var deferredPrompt=null;
  window.addEventListener('beforeinstallprompt',function(e){
    e.preventDefault();deferredPrompt=e;$('#ib').classList.add('on');
  });
  $('#ib_a').addEventListener('click',function(){
    if(!deferredPrompt)return;
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(function(){deferredPrompt=null;$('#ib').classList.remove('on')});
  });
  $('#ib_x').addEventListener('click',function(){$('#ib').classList.remove('on')});
  if(isIOS()&&isSafari()&&!isStandalone())$('#ios_h').classList.add('on');
  if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(function(rs){rs.forEach(function(r){r.unregister()})});if('caches' in window)caches.keys().then(function(ks){ks.forEach(function(k){caches.delete(k)})})}
})();
</script>
</body>
